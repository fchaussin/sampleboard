# Tests E2E (Playwright, Chromium) — image officielle Playwright version-alignée avec
# @playwright/test (navigateurs + deps système préinstallés). Rootless, non privilégié.
# node_modules partagé avec l'env dev (même volume nommé du projet).
#
#   docker compose -f docker-compose.e2e.yml run --rm e2e
#
# Playwright démarre lui-même le serveur Vite (voir playwright.config.ts › webServer).

services:
  e2e:
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    working_dir: /app
    command: ['npx', 'playwright', 'test']
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      - CI=true
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:
