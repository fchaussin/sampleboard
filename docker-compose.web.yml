# Livraison web/PWA auto-hébergée (M10) — sert le build statique via nginx NON privilégié.
#
#   docker compose -f docker-compose.web.yml up -d --build
#     -> http://localhost:8080 (installer la PWA depuis le navigateur)
#
# Même build que l'hébergement public ; durci comme le reste du projet (rootless, cap_drop,
# no-new-privileges) — possible car l'image écoute en 8080 avec un utilisateur non root.

services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    image: sampleboard-web
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "8080:8080"
