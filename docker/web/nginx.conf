# Sampleboard web/PWA — serveur statique. SPA à routage par FRAGMENT (#/…) : aucun
# fallback de chemin nécessaire. Caches : assets hachés immuables, service worker et
# entrée JAMAIS cachés (les mises à jour se propagent par le SW, stratégie réseau-d'abord).
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/wasm application/json
             application/manifest+json image/svg+xml;

  # Le point d'entrée et le service worker se revalident à chaque visite.
  location = /sw.js {
    add_header Cache-Control "no-cache";
  }
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Assets hachés par Vite : immuables.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
